<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aim Trainer - Dashboard</title>

<style>
:root {
    --primary: #ff2d2d;
    --bg: #050505;
    --card-bg: #0f0f0f;
    --text-dim: #888;
}

body {
    margin: 0;
    background-color: var(--bg);
    color: white;
    font-family: 'Segoe UI', system-ui, sans-serif;
}

/* ================= DASHBOARD ================= */

header {
    width: 100%;
    padding: 20px 0;
    background: rgba(10, 10, 10, 0.9);
    border-bottom: 1px solid #222;
    text-align: center;
}

.logo {
    font-size: 1.5rem;
    font-weight: 900;
    letter-spacing: 2px;
    color: white;
    text-decoration: none;
}

.logo span { color: var(--primary); }

.hero {
    text-align: center;
    padding: 60px 20px;
}

.hero h1 {
    font-size: 3.5rem;
    margin: 0;
    background: linear-gradient(to bottom, #fff 50%, #666 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    width: 90%;
    max-width: 1200px;
    padding-bottom: 50px;
    margin: auto;
}

.card {
    background: var(--card-bg);
    border: 1px solid #1a1a1a;
    border-radius: 12px;
    padding: 30px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
    border-top: 3px solid transparent;
}

.card:hover {
    transform: translateY(-8px);
    background: #141414;
}

.card-icon { font-size: 2.5rem; margin-bottom: 15px; }
.card h2 { margin: 0 0 10px; font-size: 1.2rem; }
.card p { font-size: 0.9rem; color: var(--text-dim); }

/* ================= CONTRAT ================= */

#consent-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
}

.consent-box {
    background: #111;
    border: 1px solid #222;
    border-radius: 12px;
    padding: 30px;
    max-width: 550px;
    text-align: left;
    font-size: 0.9rem;
}

.consent-box h2 {
    text-align: center;
    margin-top: 0;
}

.consent-box p {
    color: #bbb;
    line-height: 1.6;
}

.hidden {
    font-size: 0.55rem;
    opacity: 0.25;
}

.consent-buttons {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    gap: 15px;
}

button {
    padding: 10px 20px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
}

.accept {
    background: #2dfb2d;
    color: black;
}

.refuse {
    background: #ff2d2d;
    color: white;
}

/* ================= REFUS ================= */

#refuse-screen {
    display: none;
    text-align: center;
}

.progress-bar {
    width: 100%;
    height: 18px;
    background: #222;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 20px;
}

.progress {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff2d2d, #ff8400);
}

#accept-later {
    display: none;
    margin-top: 25px;
}
</style>
</head>

<body>

<header>
    <a href="#" class="logo">AIM<span>TRAINER</span></a>
</header>

<div class="hero">
    <h1>Dashboard d'Entraînement</h1>
    <p style="color:#888;">Sélectionnez un module pour commencer</p>
</div>

<div class="container">
    <div class="card"><div class="card-icon">🎯</div><h2>Précision</h2><p>Entraînement à la précision.</p></div>
    <a href="entrainement suivie.html">entrainement suivie</a>
    <div class="card"><div class="card-icon">👁️</div><h2>Suivi</h2><p>Tracking visuel.</p></div>
    <div class="card"><div class="card-icon">⚡</div><h2>Vitesse</h2><p>Clicks rapides.</p></div>
    <div class="card"><div class="card-icon">⏱️</div><h2>Réflexes</h2><p>Temps de réaction.</p></div>
</div>
</body>
</html>
